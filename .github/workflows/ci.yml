name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.12.1

jobs:
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @yezz/web lint
        continue-on-error: true

      - name: Typecheck
        run: pnpm typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API unit tests
        run: pnpm test:api

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @yezz/db build

      - name: Build API
        run: pnpm --filter @yezz/api build

      - name: Build Web
        run: pnpm --filter @yezz/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_USE_API: "true"

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: yezz
          POSTGRES_PASSWORD: yezz
          POSTGRES_DB: yezz_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @yezz/db build

      - name: Run database migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgres://yezz:yezz@localhost:5432/yezz_test

      - name: Seed test data
        run: pnpm db:seed
        env:
          DATABASE_URL: postgres://yezz:yezz@localhost:5432/yezz_test
          ADMIN_EMAIL: admin@yezz.local
          ADMIN_PASSWORD: changeme

      - name: Build API
        run: pnpm --filter @yezz/api build

      - name: Install Playwright browsers
        run: pnpm --filter @yezz/web exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @yezz/web exec playwright test
        env:
          DATABASE_URL: postgres://yezz:yezz@localhost:5432/yezz_test
          REDIS_URL: redis://localhost:6379
          PORT: 4000
          JWT_SECRET: test-secret-key-for-ci-only
          JWT_EXPIRES_IN: 24h
          NODE_ENV: test
          CORS_ORIGIN: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_USE_API: "true"
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
