# Local dev: Postgres + Redis only (run API with `pnpm dev:api`)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yezz
      POSTGRES_PASSWORD: yezz
      POSTGRES_DB: yezz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yezz -d yezz"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
