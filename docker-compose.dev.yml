# Local dev: Postgres + Redis only (run API with `pnpm dev:api`)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yezz
      POSTGRES_PASSWORD: yezz
      POSTGRES_DB: yezz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yezz -d yezz"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: yezz
      MINIO_ROOT_PASSWORD: yezzsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3 &&
      mc alias set local http://minio:9000 yezz yezzsecret &&
      mc mb -p local/yezz-media 2>/dev/null || true &&
      mc anonymous set download local/yezz-media &&
      echo MinIO bucket yezz-media ready
      "

volumes:
  postgres_data:
  minio_data:
