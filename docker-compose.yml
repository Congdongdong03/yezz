services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yezz
      POSTGRES_PASSWORD: yezz
      POSTGRES_DB: yezz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yezz -d yezz"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: yezz
      MINIO_ROOT_PASSWORD: yezzsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 yezz yezzsecret &&
      mc mb -p local/yezz-media 2>/dev/null || true &&
      mc anonymous set download local/yezz-media &&
      echo MinIO bucket yezz-media ready
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://yezz:yezz@postgres:5432/yezz
      REDIS_URL: redis://redis:6379
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 24h
      NODE_ENV: development
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: yezz
      S3_SECRET_KEY: yezzsecret
      S3_BUCKET: yezz-media
      S3_PUBLIC_URL: http://localhost:9000/yezz-media
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://yezz:yezz@postgres:5432/yezz
      ADMIN_EMAIL: admin@yezz.local
      ADMIN_PASSWORD: changeme
    command: ["sh", "-c", "pnpm db:migrate"]
    depends_on:
      postgres:
        condition: service_healthy

  # Run once during initial setup: docker compose --profile seed up seed
  seed:
    profiles: ["seed"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://yezz:yezz@postgres:5432/yezz
      ADMIN_EMAIL: admin@yezz.local
      ADMIN_PASSWORD: changeme
      FORCE_SEED: "true"
    command: ["sh", "-c", "pnpm db:seed"]
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_USE_API: "true"
        NEXT_PUBLIC_MEDIA_URL: http://localhost:9000/yezz-media
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_USE_API: "true"
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
