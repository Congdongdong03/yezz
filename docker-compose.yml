services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yezz
      POSTGRES_PASSWORD: yezz
      POSTGRES_DB: yezz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yezz -d yezz"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://yezz:yezz@postgres:5432/yezz
      REDIS_URL: redis://redis:6379
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 24h
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
